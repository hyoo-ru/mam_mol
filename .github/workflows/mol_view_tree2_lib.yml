name: mol_view_tree2_lib

on:
  workflow_dispatch:
  push:
    branches: 
      - master
    paths:
      - '.github/workflows/mol_view_tree2_lib.yml'
      - 'tree2/**'
      - 'view/tree2/**'
      - 'build/**'
  pull_request:
  schedule:
    - cron: "0 7 * * *"

jobs:
  build:

    runs-on: ubuntu-latest
    
    steps:
    
    - uses: hyoo-ru/mam_build@77445fb6e8333a530379d799c152553e9fb0932c
      with:
        package: mol
        modules: view/tree2/lib
    
    - uses: JS-DevTools/npm-publish@0f451a94170d1699fd50710966d48fb26194d939
      if: ${{ github.ref == 'refs/heads/master' }}
      with:
        token: ${{ secrets.NPM_AUTH_TOKEN }}
        package: ./mol/view/tree2/lib/-/package.json
