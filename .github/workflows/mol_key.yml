name: mol_key

on:
  workflow_dispatch:
  push:
    branches: 
      - master
    paths:
      - '.github/workflows/mol_key.yml'
      - 'key/**'
      - 'build/**'
  pull_request:
  schedule:
    - cron: "0 7 * * *"

jobs:
  build:

    runs-on: ubuntu-latest
    
    steps:
    
    - uses: managedkaos/print-env@cc44fee1591e49c86931a4a7458926ec441a85dd
    
    - uses: hyoo-ru/mam_build@77445fb6e8333a530379d799c152553e9fb0932c
      with:
        package: mol
        modules: key
    
    - uses: JS-DevTools/npm-publish@0f451a94170d1699fd50710966d48fb26194d939
      if: ${{ github.ref == 'refs/heads/master' }}
      with:
        token: ${{ secrets.NPM_AUTH_TOKEN }}
        package: ./mol/key/-/package.json
