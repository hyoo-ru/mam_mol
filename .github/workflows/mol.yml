name: $mol

on:
  workflow_dispatch:
  push:
    branches: 
    - master
  pull_request:
  schedule:
  - cron: "0 7 * * *"

jobs:
  build:

    runs-on: ubuntu-latest
    
    steps:
    
    - name: Environment Printer
      uses: managedkaos/print-env@cc44fee1591e49c86931a4a7458926ec441a85dd
    
    - name: Build apps
      uses: hyoo-ru/mam_build@77445fb6e8333a530379d799c152553e9fb0932c
      with:
        token: ${{ secrets.GH_PAT }}
        package: mol
        modules: app/docs app/hello app/supplies perf/jsfb perf/sierp perf/uibench perf/dbmon perf/dopes app/quine app/questions time/all plot/all app/report syntax2 func/sandbox/demo
        
    - name: Consolidate apps
      run: |
        rm -rf mol/.git
        rm -rf mol/.github
        rm -rf mol/.gitignore
        rm -rf mol/icon
        echo "<meta http-equiv='refresh' content='0;URL=./app/docs/-/'>" >> mol/index.html
        
    - uses: hyoo-ru/gh-deploy@ba1486788b0490a235422264426c45848eac35c6
      if: github.ref == 'refs/heads/master'
      with:
        folder: 'mol'
  
  notify:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
    - uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0
      with:
        token: ${{ secrets.GH_PAT }}
        repository: ${{ matrix.repo }}
        event-type: dependency_changed
        client-payload: '{"repository":${{ toJson(github.event.repository.name) }}}'
    strategy:
      matrix:
        repo:
          - hyoo-ru/mol.hyoo.ru
